front:
  text: 太上洞真智慧上品大誡雨一元始天尊以開皇元年七月一日午時於西那玉國鬱剎之山浮羅之嶽長桑林中授太上道君智慧上品大誡法文是其時也道君受誡起北向首體投地回心十方還向東而伏天尊告太上道君曰今當宣通法音開悟羣生為諸男女解災却患請福度命拔諸苦根使生者見道身脫八難死者歡樂飲食天堂早生人中轉輪聖王修齋求道皆當一心請奉十誡諦受勿忘專心默念洞思自然母生雜想撓亂形神能如是者便當靜聽天尊告曰第一誡者心不惡妬無生隂賊緘口慎過想
  hash: sha256:082ada840defa006c89ba95a71dc0996b11f05c90f58156c9c012ca0cbcdf60c
