body:
  text: 念在法第二誡者守仁不殺愍濟羣生慈愛廣救潤及一切第三誡者守貞推讓不淫不盜常行善念損已濟物第四誡者不色不欲心無放蕩貞潔寧慎行無玷汙第五誡者口無惡言言不華綺內外中直不犯口過第六誡者減酒節行調和氣性神不損傷無犯衆惡第七誡者不得嫉人勝已爭競功名每事遜讓退身度人第八誡者不得評論經教訾毀聖文躬心承法恆如對神第九誡者不得鬪亂口舌評論四輩天人咎恨傷損神氣第十誡者舉動施為平等一心人和神穆行常使然天尊言修奉諸誡每合天心常行大慈願為一切普度厄世謙謙尊教不得中怠寧守善而死不為惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齋奉誡自得度世太上道君不勝喜懼稽首奉命天尊言夫學者修齋行道開度天人作諸善功當行十二可從而得度世者爾宜從之自得正真終入無為所願皆成第一者見真經出法開度一切便發道意心願後世得登大聖第二者常行慈心願念一切普得見聞開度廣逺無有障翳第三者好樂經教深逺覽達意志堅明開化愚暗第四者尊受師訓廣開勸化令入法墻逺離盲道第五者信向玄妙尊奉經訣晨夕誦習無有怠倦第六者不務榮華斷俗因緣專心定志所營在法第七者勤誦大經願念一切廣開橋梁為來生作緣第八者敬生善心不邪不偽無嫉無害無惡無妬第九者在所托生常值聖世與靈寶法教相值不絶第十者潔身持誡修齋建功廣救羣生咸得度脫第十一者學業廣覽宣通洞法預以天人普令開度第十二者常與明師世世相值受教宣化度人無量一切善心皆得真道天尊言學士修行之法當行十二可從之誡能以一心行此善念世世得見聖文與道結緣諸天女識獨超三界無所罣礙長離三惡五道八難萬神敬護地祇擁衛門戶清肅萬災不干可謂端正而得道也勤為習誦廣宣同學皆使一心齊入法門天尊言道尊法妙人身亦貴故道開法遺誡經文以度人身人身既度上與道同冥為精行持齋奉誡夷心靜默志念分明一意皈向專想不二滌蕩六府過中不味內外清虛每合自然是其齋日捻香啓願應心上徹四天司邏十部威神即下履行觀聽至音鑒映爾心如誡行道皆列功諸天禍福立彰道不負人勤行諦受勿使魔言天尊言若善男子善女人能發自然道意來入法門受我十誡行十二可從則為大道清信弟子皆與勇猛飛天齊功飛天未得道者也是大道十轉弟子飛行虛空為諸天策駕清信弟子見在世上可得免於憂惱度於衆苦身入光明形內澄正招鬼使神制伏魔精十轉即得上為飛天若在一轉而行精進心不懈退作諸功德長齋苦行晨夕不倦即得飛天於此而進超陵三界為上清真人天尊言受我十誡十二可從皆當稽首稱清信弟子從今受誡一心奉行不敢不信皈命十方能如是者見世門戶隆盛咸得康強地祇侍衛三界司迎七祖魂神上升南宫衣飯天廚早得更生還於人中國王之門世世不絶與道因緣天尊言建齋行道四天帝王皆駕飛雲緑軿八景玉輿侍從真人玉女手把華幡前導鳯歌後從天鈞白鶴獅子嘯歌雍雍燒香散華浮空而來瞻禮行道觀聽法音天王下降萬靈朝焉如是豈不盡其法也當先受十誡然後行道庠序雅步靜心閉意坐起卧息不離儀格天王歡恱列名上清可謂得道在方寸之間智慧閉塞六情上品誡第一誡者目無廣瞻亂諸華色亡睛失瞳光不明徹第二誡者耳無亂聽混於五音傷神敗正惡聲啼吟第三誡者鼻無廣嗅雜氣臭腥易有混濁形不澄正第四誡者口無貪味脂薰之屬濁注五神臟腑漬潰第五誡者手無犯惡不𥨸人物貪利入已禍不自覺第六誡者心無愛欲搖動五神傷精喪氣體發迷荒天尊言其六誡者身之大患來生男女雖受人形而六情不純未見經教不聞法音形不自覺沉迷罪門致命短促不竟天年長處惡道甚可哀憐故説是誡開度人天善心信向一意歸命尊奉聖教閉諸惡門則形入虛空六通智慧六通智慧者洞視同聽洞空洞虛洞清洞微是為六通無所不通也六情恬夷神自歸也一自生也精自固也壽命長逺終不死也智慧度生上品大誡一者見人窮急度其死厄見世明逹能制凶逆年命長逺世享無極二者見人窮乏飢寒困急損身布施令人富貴福報萬倍世世歡樂三者含血之類有急投人能為開度濟其死厄見世康強不遭橫惡四者施慧鳥獸有生之類割口飴之無所愛惜世世飽滿常在福地五者度諸蠢動一切衆生咸使成就無有夭傷見世與盛不履衆橫六者常行慈心愍濟一切放生度厄其功甚重令人見世居危得安居疾得康居貧得富舉向從心天尊言其六誡者皆以心通智慧能施其德行合自然慶福恆居其身禍害常逺其門玩好不絶世世因緣一轉受報飛天齊功超輪九轉漸入大道十轉弟子名書諸天七祖同升上生天堂衣食福德即生人中轉輪神王恆居福門智慧十善勸助上品大誡一者勸助禮敬三寶供養法師令人世為君子賢孝髙才榮貴巍巍生為人尊門族昌熾二者勸助治寫經書令人世世聰明博聞妙義恆值聖世見諸經教能誦章句三者勸助建齋靜舍令人世世門戶髙貴身登天堂飯食自然常居無為四者勸助香油衆乏令人世世芳盛香潔光明容睟絶偉天姿髙秀五者勸助法師法服令人世世長雅逍遙中國不墮邊夷男女端正冠冕玉珮六者勸助國王父母子民忠孝令人世世多嗣男女賢儒不經諸苦七者勸助齋靜讀經令人世世不墮地獄即升天堂禮見衆聖速得反形化生王家在意所欲玩服備足七祖同歡善緣悉會終始榮樂法輪運至將得仙道八者勸助道士衆人經學令人世世才智洞逹動靜威儀常為人師九者勸助一切布施諌諍令人世世壽考富樂常無怨惱十者勸助一切人民除嫉去欲履行衆善令人世世安樂禍亂不生病者自愈仕宦髙遷為衆所仰莫不吉祐門戶清貴天人愛育神魔敬護常生福地天尊言其十善勸誡自非大道十轉弟子莫能行也能行之者與飛天齊功心與六通智慧參同洞虛無也身後皆得飛行雲中衆聖䇿駕遊乎十方從此不懈亦得位及仙王七祖即離幽夜升入南宫衣飯天廚受福自然其法髙妙度人無量巍巍大化難可勝焉天尊言六通智慧者天曰洞視地曰洞聽東曰洞空西曰洞虛南曰洞清北曰洞微六通洞逹遼邈無端不可得測不可得窮無所不包無所不容其有六覺之氣常通六慧人識六通則六覺明焉制御六情使人自然棄諸惡根生諸善念心體六惠自得神仙天尊言為道之本欲度十苦八難之中當受大誡修齋建德立諸善功為三界所稱諸天所觀身無不度道無不成不受大誡徒為長齋或斷谷休糧隱遁山林肉身求度而無六通智慧之行徒失爾功無由成就善男子善女人有至心者勤求諦受今説是經廣加開度咸使十方普聞法音天尊言天為洞視則天眼智髙慧洞無窮自上自下四面八方無所不照無所不明雖曰一通智慧而五色總焉天洞自然故無損傷人則法天目中朱童亦有五色之光人不持戒六覺之氣不通人孔竅智慧未開廣視五色則眼童飛揚光睛昏翳令人目盲故説是誡以度天人咸使男女得聞法音欲得過度年命長逺當奉是誡勤行勿忘慎多色想放蕩目神每自制御愛養眼童思真靜念令通智慧洞觀虛空持誡制己則五色歸身五色自歸則無損傷保爾年命可得無窮天尊言地為洞聽智逺慧聞故響應天上下徹四方無所不窮無所不聞雖曰一通智慧而五音總焉地洞自然以生五音眹而不動故無損傷人則像地耳中則有五聲之神人不持誡則智慧不通不可亂聽五音之聲五音使人五神飛揚耳中空廢隆隆悲鳴五神啼泣致令聾故説是誡以度天人咸使男女普聞法音欲得長生當持大誠以制耳神勿為多聽非法之音靜聽妙經神真之章令通智慧洞響太空持誡制巳則五音歸身五音自歸則耳無惡聲保爾年命尅得長逺天尊言東為洞空始陽之氣氣出於空智明慧寥故曰洞空洞逺無礙不可得窮始青之氣雖曰一通智慧而五氣總焉空無不納故無損傷人雖有形形亦法空鼻有黃寧辟非之神人未持誡則智慧不通未入智慧不可雜食臭腥之物臭腥之氣使人鼻神壅塞經源易有斷絶明梁不通故説是誡以度天人咸使男女得聞法音欲度諸苦八難之中當受是誡以制鼻神勿多受臭滌蕩明梁導引生氣通明智慧洞氣入空持誡制己則衆氣歸身衆氣自歸與氣混同長保身命終不毀傷天尊言西為洞虛少陽之氣氣出於虛智微慧朗故曰洞虛虛之無礙洞逺難窮少隂之氣雖曰一通智慧而五味總焉虛無不入虛無不容人雖法虛身不持戒則智慧不通智慧未入則五味為患貪啖脂薰則五神不安致有傾訖年命不長故説是誡以度天人咸令男女普聞法音欲得長命當持大誡以制五神慎勿貪五味甘其脂薰滌蕩五臟每令清涼身有智慧則五味知香內外怡夷年命不傷也天尊言南為洞清太陽之氣氣出於清智清慧開關而洞清故南有赤帝洞陽之庭冶錬萬物受鍊而明也人不持誡則智慧不通智慧不通則心神振動生於愛欲使人迷荒喪神傷命壽不得長故説是誡以度天人咸使男女普聞法音欲得長壽過度諸患當受是誡以制心神除情遣欲棄塵入清通明智慧六覺開津身入洞清與氣自然保爾年命得永長存天尊言北曰洞微生於玄智逺慧深微而洞真隂察罪福主人生元手法四時上應天關天關恆轉手亦動焉手有大神接生方盈運人四大觀人敗成人不持誡智慧不通則搖動人心衆惡並生手作不覺貪𥨸自營致有短命不終年故説是誡以度天人欲得長夀過度惡根當奉是誡以制手神通明智慧心自開明手不貪𥨸惡根不生應天順氣身入自然保爾壽命永得長存智慧功德報應上品誡誡曰施散供飬三寶神經一錢巳上皆七十四萬倍報一萬以上報不可勝名記諸天身登太上十轉弟子七祖上升為諸天賔友誡曰施散法師法服治寫經書建立靜治一錢以上皆三十二萬倍報萬錢以上報不可勝世世聰明恆值明師生於貴門七祖皆為太上之賔誡曰施散法師道士香油齋食一錢以上皆二十四萬倍報功多則報重世世豐有恆無窮乏七祖歡泰恆食天廚誡曰施散山棲道士一錢以上皆一十二萬倍報功多則報重世世恆值聖師見道法教七祖皆得五帝交遊誡曰施散清信弟子香燭齋食一錢以上皆三萬二千倍報世世歡樂不見諸苦七租上升天堂逍遙無為恆居福中誡曰施散天人窮乏一錢巳上皆一萬二千倍報功多報多世世富貴歡樂無極七祖皆受四方天廚衣食自然誡曰施散衆生損己餉食一錢巳上皆七祖二百倍報世世子孫昌熾門戶興盛六千免離地獄上升自然福中天尊告太上道君曰智惠上品功德之誡天人男女有發自然道意損巳布散開張福田功德甚重施一之功數萬之報應之理明如日月或在見世或在來生但福報差移不必同至其中或有計功補過或以德贖罪或為祖世拔諸刑責是致報應不即明顯三官九府記人功過毫分不失或先罪已除身不犯過後功未明與凡不異此由已身受生日尅應諸天解度然後福報雖爾推移七祖魂神已升天堂福會於後萬無差錯明告男女令知報應天道不虛善心信向勤行勿懈尅得開度受福無窮也天尊告太上道君曰諸天上聖至真大神諸天帝王及已過去塵沙之輩得道之者莫不由施散布德作諸善功功滿德足以致善報輪轉不絶皆得道真超陵三界逍遙上清大羅之天玉京玄臺七寶林中此時皆知施功不失歡樂自然世世無量所施蓋微福慶無極末世偽薄人情慳貪唯知聚積為已重擔莫能發心作此功德功既無積罪穢日生長逺福堂沉淪罪門展轉五道八難之中一失福世無有還期男女相牽莫識宿命所從而來見其魂神甚可痛傷令為諸天説是禁誠咸令男女普聞法音開度羣生使入福中天尊言我歷觀諸天地獄之中男女責作幽牢窮魂莫非先身不見明誡見而不行或行而不遵回生悔心還入罪門或生而犯惡不遇善緣或不知施散發心建功廣作福田以拔宿根唯知作罪流曵三塗八難之中念其愚癡甚可哀傷故説是誡開度天人咸使男女普聞法音知發道心建立善功以拔諸苦與道為緣咸得歡泰逍遙自然太上道君受誡於元始天尊開度諸天四方邊土功德成就以傳諸天天王十方大聖太微帝君四極真人東華宫中方諸大神玉女羣仙普使宣通濟度來生令聞法音是時諸天莫不欣喜善哉善哉太上洞真智慧上品大誡終
